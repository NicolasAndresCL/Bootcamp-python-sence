<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}Mi Tienda{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'inicio' %}">🛒 Mi Tienda</a>
        <ul class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
            <li class="nav-item"><a class="nav-link" href="{% url 'productos' %}">Productos</a></li>
            <li class="nav-item"><span class="navbar-text text-white me-2">Hola, {{ user.username }}</span></li>
            <li class="nav-item">
              <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-light">Cerrar sesión</button>
              </form>
            </li>
          {% else %}
            <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'registro' %}">Registrarse</a></li>
          {% endif %}
        </ul>
      </div>
    </nav>
  </header>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">© 2026 Mi Tienda — Proyecto Django (Módulo 6)</p>
  </footer>
</body>
</html>
