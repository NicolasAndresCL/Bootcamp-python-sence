{% extends "catalogo/base.html" %}
{% block titulo %}Eliminar producto{% endblock %}

{% block content %}
  <h1 class="h3 mb-3">Eliminar producto</h1>
  <p>¿Seguro que deseas eliminar <strong>{{ producto.nombre }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'listar_productos' %}" class="btn btn-secondary">Cancelar</a>
  </form>
{% endblock %}
